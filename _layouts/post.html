---
layout: default
---

<table style="width:100%;border:0;border-spacing:0;border-collapse:separate;margin-right:auto;margin-left:auto;">
  <tr>
    <td style="padding:2.5%;width:100%;vertical-align:middle;">
      <h1>{{ page.title }}</h1>
      {% if page.authors %}<p>{{ page.authors }}</p>{% endif %}
      {% if page.venue %}<p><em>{{ page.venue }}</em>, {{ page.date | date: "%Y" }}</p>{% endif %}
      {{ content }}
    </td>
  </tr>
</table>
